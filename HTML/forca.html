<!DOCTYPE html> 
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../CSS/forca.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
        <link rel="icon" href="https://play-lh.googleusercontent.com/_fD2LCUHLtChVW6SqUwkqrBlmR_DXdptgj6f9bwi93gCoemwhsDUK2loA12QH5S5YZE" />
        <title>Jogo da Forca</title>
    </head>

    <body>
        <header class="header">
            <h1>Bem vindo ao jogo da Forca</h1>
        </header>

        <div id="flash_vermelho">
            <div class="guias">
                <a href="introducao.html" alt="Redirecionamento para página de como jogar">Como jogar</a>
                <span>Jogar</span>
                <a href="contato.html">Entre em contato</a>
            </div>
            <div class="espaco_jogo">
                <p>Informe uma letra para iniciar</p>
                <br />
                <canvas id="canvas" width="300" height="300"> </canvas>
                <h1>Palavra: <span id="palavra"></span>  
                    <!--Colocar a lógica do desenho do boneco aqui-->
                </h1>

                <div class="letras_erradas">
                    <h1>
                        <span id="letras_erradas"></span>
                    </h1>
                </div>
            </div>
            <div class="espaco_letras">
                    <input type="text" id="Letra" name="Letra" placeholder="Digite uma letra" maxlength="1" required autocomplete="off" autocorrect="off" spellcheck="false" />
                    <button id="botao_envia" type="submit" style="margin-left: 5px;">Enviar</button>
                    <button id="botao_reinicia" type="reset">Reiniciar</button>
            </div>
        </div>
    </body>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="../JAVASCRIPT/meuScript.js"></script>
</html>
